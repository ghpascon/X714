<!DOCTYPE html>
<html>
  <head>
    <title>X714 WIFI CONFIG</title>
    <link rel="stylesheet" type="text/css" href="/style.css" />
  </head>

  <body class="eth">
    <div class="container0">
      <div class="container1">
        <div class="container2">
          <label class="SMTX">X714</label>
        </div>
        <div class="container2">
          <button onclick="window.location.href='/'">HOME</button>
        </div>
      </div>

      <div
        style="display: flex; flex-direction: column; align-items: center"
        class="container1"
      >
        <form action="/save_wifi_config" method="POST" target="hidden_iframe">
          <div id="table_div" class="container1">
            <table id="config_table">
              <thead>
                <tr>
                  <th><h1>PARAMETER</h1></th>
                  <th><h1>VALUE</h1></th>
                </tr>
              </thead>

              <tbody>
                <tr>
                  <td><label>SSID:</label></td>
                  <td>
                    <input
                      class="placeholder_style"
                      type="text"
                      name="wifi_ssid"
                      id="wifi_ssid"
                    />
                  </td>
                </tr>

                <tr>
                  <td><label>PASSWORD:</label></td>
                  <td>
                    <input
                      class="placeholder_style"
                      type="password"
                      name="wifi_password"
                      id="wifi_password"
                    />
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="container1">
            <input class="bt_style" type="submit" value="SET CONFIG" />
          </div>
        </form>
        <iframe name="hidden_iframe" style="display: none"></iframe>
      </div>

      <div class="container1">
        <h1>CURRENT CONFIG</h1>
      </div>

      <div class="container1">
        <table class="table_2" id="dataTable">
          <thead>
            <tr>
              <th>PARAMETER</th>
              <th>VALUE</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </body>

  <script>
    window.onload = function () {
      fetch("/get_wifi_config")
        .then((response) => response.json())
        .then((data) => {
          document.getElementById("wifi_ssid").value = data.wifi_ssid;
          document.getElementById("wifi_password").value = data.wifi_password;
        })
        .catch((error) => {
          console.error("Error fetching wifi config:", error);
        });
    };

    setInterval(update_elements, 1000);

    function update_elements() {
      fetch("/table_wifi_att")
        .then((response) => response.json())
        .then((data) => {
          const tbody = document
            .getElementById("dataTable")
            .getElementsByTagName("tbody")[0];
          tbody.innerHTML = "";
          data.forEach((row) => {
            let tr = document.createElement("tr");
            row.forEach((cell) => {
              let td = document.createElement("td");
              td.textContent = cell;
              tr.appendChild(td);
            });
            tbody.appendChild(tr);
          });
        })
        .catch((error) => console.error("Error fetching data:", error));
    }
  </script>
</html>
