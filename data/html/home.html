<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>X714 HOME</title>
    <link rel="stylesheet" type="text/css" href="/style.css" />
  </head>

  <body>
    <div class="container1">
      <label class="SMTX">&#176; X714 &#172;</label>
    </div>

    <div class="container1">
      <h1>HOME</h1>
    </div>

    <div class="container1">
      <button class="button_links" onclick="window.location.href = '/reader'">
        READER
      </button>
    </div>
    <br />

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/reader_modes'"
      >
        READER MODES
      </button>
    </div>

    <br />

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/ant_config'"
      >
        CONFIG ANT
      </button>
    </div>

    <br />

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/eth_config'"
      >
        ETH CONFIG
      </button>
    </div>

    <br />

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/webhook_config'"
      >
        WEBHOOK CONFIG
      </button>
    </div>

    <br />

    <div class="container1">
      <button class="button_links" onclick="window.location.href = '/prefix'">
        PREFIX CONFIG
      </button>
    </div>

    <br />

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/protected_inventory'"
      >
        PROTECTED INVENTORY
      </button>
    </div>

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/reader_config'"
      >
        CONFIG READER
      </button>
    </div>

    <br />

    <div class="container1">
      <button class="button_links" onclick="window.location.href = '/gpo_test'">
        GPO
      </button>
    </div>
    <div class="container1" id="info-container" style="display: none">
      <h2>Informações do dispositivo</h2>
      <table class="table_tags" id="deviceTable">
        <thead>
          <tr>
            <th>Propriedade</th>
            <th>Valor</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="2">Carregando informações...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      fetch("/get_info", { credentials: "same-origin" })
        .then(function (resp) {
          if (!resp.ok) throw new Error("Network response was not ok");
          return resp.arrayBuffer();
        })
        .then(function (buffer) {
          // Tenta UTF-8 primeiro; se falhar, tenta ISO-8859-1
          var decoder = new TextDecoder("utf-8");
          var text = decoder.decode(buffer);
          try {
            return JSON.parse(text);
          } catch (e) {
            var decoderIso = new TextDecoder("iso-8859-1");
            text = decoderIso.decode(buffer);
            return JSON.parse(text);
          }
        })
        .then(function (data) {
          var container = document.getElementById("info-container");
          var tbody = document
            .getElementById("deviceTable")
            .getElementsByTagName("tbody")[0];
          container.style.display = "block";
          tbody.innerHTML = "";
          var rows = [
            ["Nome", data.name],
            ["BT MAC", data.bt_mac],
            ["ETH MAC", data.eth_mac],
            ["IP", data.ip],
            ["Versão", data.version],
          ];
          rows.forEach(function (pair) {
            var key = pair[0];
            var value = pair[1];
            if (value !== undefined && value !== null && value !== "") {
              var tr = document.createElement("tr");
              var tdKey = document.createElement("td");
              tdKey.textContent = key;
              var tdVal = document.createElement("td");
              tdVal.textContent = value;
              tr.appendChild(tdKey);
              tr.appendChild(tdVal);
              tbody.appendChild(tr);
            }
          });
        })
        .catch(function (err) {
          var tbody = document
            .getElementById("deviceTable")
            .getElementsByTagName("tbody")[0];
          tbody.innerHTML =
            "<tr><td colspan='2'>Erro ao obter informações</td></tr>";
          console.error(err);
        });
    });
  </script>
</html>
