<!doctype html>
<html>
  <head>
    <title>X714 HOME</title>
    <link rel="stylesheet" type="text/css" href="/style.css" />
    <style>
      #loading-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.75);
        z-index: 1000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      #loading-overlay.visible {
        display: flex;
      }
      .spinner {
        width: 80px;
        height: 80px;
        border: 10px solid #333333;
        border-top: 10px solid #ffb41f;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 30px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loading-label {
        font-family: Arial, sans-serif;
        font-size: 45px;
        color: #ffb41f;
      }
    </style>
  </head>

  <body>
    <div id="loading-overlay">
      <div class="spinner"></div>
      <label class="loading-label">UPLOADING...</label>
    </div>

    <div class="container1">
      <label class="SMTX">&#176; X714 &#172;</label>
    </div>

    <div class="container1">
      <h1>HOME</h1>
    </div>

    <div class="container1"></div>

    <div class="container1">
      <button class="button_links" onclick="window.location.href = '/reader'">
        READER
      </button>
    </div>
    <br />

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/reader_modes'"
      >
        READER MODES
      </button>
    </div>

    <br />

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/ant_config'"
      >
        CONFIG ANT
      </button>
    </div>

    <br />

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/eth_config'"
      >
        ETH CONFIG
      </button>
    </div>

    <br />

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/wifi_config'"
      >
        WIFI CONFIG
      </button>
    </div>

    <br />

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/webhook_config'"
      >
        WEBHOOK CONFIG
      </button>
    </div>

    <br />

    <div class="container1">
      <button class="button_links" onclick="window.location.href = '/prefix'">
        PREFIX CONFIG
      </button>
    </div>

    <br />

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/protected_inventory'"
      >
        PROTECTED INVENTORY
      </button>
    </div>

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/reader_config'"
      >
        CONFIG READER
      </button>
    </div>

    <br />

    <div class="container1">
      <button class="button_links" onclick="window.location.href = '/gpo_test'">
        GPO
      </button>
    </div>

    <br />

    <div class="container1">
      <button class="button_links" onclick="doRestart()">
        RESTART
      </button>
    </div>

    <div class="container1">
      <label>Firmware / FS update</label>
      <br />
      <button class="button_links" id="btn-fw">Upload Firmware</button>
      <button class="button_links" id="btn-fs">Upload FS</button>
      <input type="file" id="file-input" style="display: none" />
    </div>
    <div class="container1">
      <table class="table" id="info_table">
        <thead>
          <tr>
            <th><h1>INFO</h1></th>
            <th><h1>VALOR</h1></th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td><label>Nome</label></td>
            <td><label id="info-name">-</label></td>
          </tr>

          <tr>
            <td><label>BT MAC</label></td>
            <td><label id="info-bt">-</label></td>
          </tr>

          <tr>
            <td><label>ETH MAC</label></td>
            <td><label id="info-eth">-</label></td>
          </tr>

          <tr>
            <td><label>IP</label></td>
            <td><label id="info-ip">-</label></td>
          </tr>

          <tr>
            <td><label>Versão</label></td>
            <td><label id="info-version">-</label></td>
          </tr>

          <tr>
            <td><label>Power</label></td>
            <td><label id="info-power">-</label></td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>

  <script>
    var loadingOverlay = document.getElementById("loading-overlay");

    function showLoading() {
      loadingOverlay.classList.add("visible");
    }

    function hideLoading() {
      loadingOverlay.classList.remove("visible");
    }

    // Upload handlers for firmware and filesystem
    document.getElementById("btn-fw").addEventListener("click", function () {
      doUpload("/update_firmware");
    });
    document.getElementById("btn-fs").addEventListener("click", function () {
      doUpload("/update_fs");
    });

    function doUpload(endpoint) {
      const input = document.getElementById("file-input");
      input.value = null;
      input.onchange = function () {
        const file = input.files[0];
        if (!file) return;
        const form = new FormData();
        form.append("firmware", file);
        showLoading();
        fetch(endpoint, { method: "POST", body: form })
          .then((r) => r.text())
          .then((t) => {
            hideLoading();
            alert("Resposta: " + t);
          })
          .catch((e) => {
            hideLoading();
            alert("Erro: " + e);
          });
      };
      input.click();
    }

    function doRestart() {
      if (!confirm("Reiniciar o dispositivo?")) return;
      fetch("/restart", { method: "POST" })
        .then((r) => r.text())
        .then((t) => alert("Resposta: " + t))
        .catch((e) => alert("Erro: " + e));
    }

    function update_info() {
      fetch("/info", { credentials: "same-origin" })
        .then(function (response) {
          if (!response.ok) throw new Error("HTTP error " + response.status);
          return response.json();
        })
        .then(function (data) {
          document.getElementById("info-name").innerText = data.name || "-";
          document.getElementById("info-bt").innerText = data.bt_mac || "-";
          document.getElementById("info-eth").innerText = data.eth_mac || "-";
          document.getElementById("info-ip").innerText = data.ip || "-";
          document.getElementById("info-version").innerText =
            data.version || "-";
          document.getElementById("info-power").innerText = data.power || "-";
        })
        .catch(function (error) {
          console.warn("Erro ao obter /info:", error);
        });
    }

    update_info();
    setInterval(update_info, 5000);
  </script>
</html>
