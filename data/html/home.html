<!doctype html>
<html>
  <head>
    <title>X714 HOME</title>
    <link rel="stylesheet" type="text/css" href="/style.css" />
  </head>

  <body>
    <div class="container1">
      <label class="SMTX">&#176; X714 &#172;</label>
    </div>

    <div class="container1">
      <h1>HOME</h1>
    </div>

    <div class="container1"></div>

    <div class="container1">
      <button class="button_links" onclick="window.location.href = '/reader'">
        READER
      </button>
    </div>
    <br />

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/reader_modes'"
      >
        READER MODES
      </button>
    </div>

    <br />

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/ant_config'"
      >
        CONFIG ANT
      </button>
    </div>

    <br />

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/eth_config'"
      >
        ETH CONFIG
      </button>
    </div>

    <br />

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/webhook_config'"
      >
        WEBHOOK CONFIG
      </button>
    </div>

    <br />

    <div class="container1">
      <button class="button_links" onclick="window.location.href = '/prefix'">
        PREFIX CONFIG
      </button>
    </div>

    <br />

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/protected_inventory'"
      >
        PROTECTED INVENTORY
      </button>
    </div>

    <div class="container1">
      <button
        class="button_links"
        onclick="window.location.href = '/reader_config'"
      >
        CONFIG READER
      </button>
    </div>

    <br />

    <div class="container1">
      <button class="button_links" onclick="window.location.href = '/gpo_test'">
        GPO
      </button>
    </div>
    <div class="container1">
      <table class="table_2" id="info_table">
        <thead>
          <tr>
            <th><h1>INFO</h1></th>
            <th><h1>VALOR</h1></th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td><label>Nome</label></td>
            <td><label id="info-name">-</label></td>
          </tr>

          <tr>
            <td><label>BT MAC</label></td>
            <td><label id="info-bt">-</label></td>
          </tr>

          <tr>
            <td><label>ETH MAC</label></td>
            <td><label id="info-eth">-</label></td>
          </tr>

          <tr>
            <td><label>IP</label></td>
            <td><label id="info-ip">-</label></td>
          </tr>

          <tr>
            <td><label>Versão</label></td>
            <td><label id="info-version">-</label></td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>

  <script>
    function update_info() {
      fetch("/info", { credentials: "same-origin" })
        .then(function (response) {
          if (!response.ok) throw new Error("HTTP error " + response.status);
          return response.json();
        })
        .then(function (data) {
          document.getElementById("info-name").innerText = data.name || "-";
          document.getElementById("info-bt").innerText = data.bt_mac || "-";
          document.getElementById("info-eth").innerText = data.eth_mac || "-";
          document.getElementById("info-ip").innerText = data.ip || "-";
          document.getElementById("info-version").innerText =
            data.version || "-";
        })
        .catch(function (error) {
          console.warn("Erro ao obter /info:", error);
        });
    }

    update_info();
    setInterval(update_info, 5000);
  </script>
</html>
